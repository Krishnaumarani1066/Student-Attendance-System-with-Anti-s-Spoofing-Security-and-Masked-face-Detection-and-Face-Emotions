services:
  - type: web
    name: student-attendance-system
    env: python
    buildCommand: pip install --upgrade pip setuptools wheel && pip install --no-cache-dir torch torchvision --index-url https://download.pytorch.org/whl/cpu && pip install --no-cache-dir -r requirements.txt
    startCommand: python fixed_integrated_attendance_system.py
    runtime: python-3.11
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: FROM_NAME
        value: College Attendance System
      - key: TEACHER_EMAILS
        sync: false
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true

